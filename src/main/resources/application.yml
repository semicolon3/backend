spring:
  application:
    name: legal-ai
  datasource:
    url: jdbc:mysql://mysql-1cf218b2-my-first-db.h.aivencloud.com:11444/defaultDB?useSSL=true&allowPublicKeyRetrieval=true
    username: avnadmin
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
